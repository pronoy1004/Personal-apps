<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gradient)" opacity="0.1"/>
  <!-- Kanban board columns -->
  <rect x="20" y="25" width="15" height="50" rx="2" fill="url(#gradient)" opacity="0.3"/>
  <rect x="42.5" y="25" width="15" height="50" rx="2" fill="url(#gradient)" opacity="0.5"/>
  <rect x="65" y="25" width="15" height="50" rx="2" fill="url(#gradient)"/>
  <!-- Task cards -->
  <rect x="22" y="30" width="11" height="8" rx="1" fill="white" opacity="0.9"/>
  <rect x="22" y="42" width="11" height="8" rx="1" fill="white" opacity="0.9"/>
  <rect x="45" y="30" width="11" height="8" rx="1" fill="white" opacity="0.9"/>
  <rect x="67" y="30" width="11" height="8" rx="1" fill="white" opacity="0.9"/>
  <rect x="67" y="42" width="11" height="8" rx="1" fill="white" opacity="0.9"/>
  <rect x="67" y="54" width="11" height="8" rx="1" fill="white" opacity="0.9"/>
  <!-- Checkmark on completed task -->
  <path d="M 70 50 L 73 53 L 78 47" stroke="url(#gradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>

